site_name: Exercise Wiki
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.collapse
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

# This tells MkDocs where your documentation lives
docs_dir: docs

# The Navigation structure is the backbone of your website's sidebar
nav:
  - Home: index.md
  - Concepts:
      - Cardiac Rehabilitation Phases: concepts/cardiac-rehabilitation-phases.md
      - Aerobic Exercise Prescription: concepts/aerobic-exercise-prescription.md
      - Exercise Volume for Secondary Prevention: concepts/exercise-volume-secondary-prevention.md
      - Low-Impact Cardio Modalities: concepts/low-impact-cardio-modalities.md
      - Resistance Training Entry Timeline: concepts/resistance-training-entry-timeline.md
      - Valsalva Maneuver: concepts/valsalva-maneuver.md
      - Yoga for Cardiac Recovery: concepts/yoga-for-cardiac-recovery.md
      - Static Stretching: concepts/static-stretching.md
      - Dynamic Flexibility: concepts/dynamic-flexibility.md
      - Mobility Positions: concepts/mobility-positions.md
      - Risk Stratification: concepts/risk-stratification.md
  - Comparisons:
      - Tai Chi vs Yoga: comparisons/tai-chi-vs-yoga.md
      - Rowing vs Recumbent Cycling: comparisons/rowing-vs-recumbent-cycling.md
  - Entities:
      - Rowing: entities/rowing.md
      - Recumbent Cycling: entities/recumbent-cycling.md
      - Yoga: entities/yoga.md
      - Tai Chi: entities/tai-chi.md
      - Swimming: entities/swimming.md
      - Calisthenics: entities/calisthenics.md
      - Bar Hang: entities/bar-hang.md
      - Japanese Interval Walking: entities/japanese-interval-walking.md
      - Asian Squat: entities/asian-squat.md
      - World's Greatest Stretch: entities/worlds-greatest-stretch.md
      - Zone 2 Cardio: entities/zone-2-cardio.md
      - Plyometrics: entities/plyometrics.md
      - Loaded Carries: entities/loaded-carries.md
  - Queries:
      - Beta-Blockers & Exercise Rx: queries/beta-blockers-exercise-prescription.md
  - Log: log.md

# This enables everything you need for a professional look
plugins:
  - search

# Setup specific to your domain
extra:
  description: "A living knowledge base for low-impact fitness and recovery."
